<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kuliner Lokal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container d-flex justify-content-between align-items-center">
    
    <a class="navbar-brand fw-bold">🍜 Kuliner Lokal</a>

    <div class="dropdown">
      <button class="btn btn-dark border-0 fs-4" type="button" data-bs-toggle="dropdown">
        ⋮
      </button>

      <ul class="dropdown-menu dropdown-menu-end" id="menuList">
      </ul>
    </div>

  </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5" id="content"></div>

<script src="script.js"></script>

<script>

// ================= ROLE =================
function setRole(role){
  localStorage.setItem("role", role);
}

function getRole(){
  return localStorage.getItem("role");
}

function logout(){
  localStorage.removeItem("role");
  renderMenu();
  showPage("home");
}

// ================= MENU =================
function renderMenu(){
  let role = getRole();
  let menu = document.getElementById("menuList");

  let html = `
    <li><a class="dropdown-item" onclick="showPage('home')">Beranda</a></li>
    <li><a class="dropdown-item" onclick="showPage('daftar')">Kuliner</a></li>
    <li><a class="dropdown-item" onclick="showPage('tambah')">Tambah Kuliner</a></li>
  `;

  if(role === "admin"){
    html += `
      <li><a class="dropdown-item" onclick="showPage('dashboard')">Dashboard</a></li>
      <li><a class="dropdown-item" onclick="showPage('admin')">Panel Admin</a></li>
    `;
  }

  if(role){
    html += `<li><a class="dropdown-item text-danger" onclick="logout()">Logout</a></li>`;
  } else {
    html += `
      <li><a class="dropdown-item" onclick="showPage('login')">Login</a></li>
      <li><a class="dropdown-item" onclick="showPage('register')">Daftar</a></li>
    `;
  }

  menu.innerHTML = html;
}

// ================= PAGE =================
function showPage(page){
  let content = document.getElementById("content");

  if(page === "home"){
    content.innerHTML = `
      <div class="p-5 text-center bg-white shadow rounded">
        <h1 class="fw-bold">🍔 Jelajah Kuliner Lokal</h1>
        <p>Temukan makanan enak di daerahmu 😋</p>
      </div>
    `;
  }

  else if(page === "login"){
    content.innerHTML = `
      <div class="card p-4 col-md-4 mx-auto">
        <h3>Login</h3>
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-dark w-100" onclick="login()">Login</button>
      </div>
    `;
  }

  else if(page === "register"){
    content.innerHTML = `
      <div class="card p-4 col-md-4 mx-auto">
        <h3>Register</h3>
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-success w-100" onclick="register()">Daftar</button>
      </div>
    `;
  }

  else if(page === "tambah"){
    content.innerHTML = `
      <div class="card shadow p-4">
        <h3>Tambah Kuliner</h3>
        <form id="formKuliner">
          <input id="nama_makanan" class="form-control mb-2" placeholder="Nama Makanan" required>
          <input id="kategori" class="form-control mb-2" placeholder="Kategori">
          <input id="lokasi" class="form-control mb-2" placeholder="Lokasi">
          <input id="harga" type="number" class="form-control mb-2" placeholder="Harga">
          <textarea id="deskripsi" class="form-control mb-2"></textarea>
          <input id="rating" type="number" class="form-control mb-2" placeholder="Rating (1-5)">
          <button class="btn btn-success w-100">Simpan</button>
        </form>
      </div>
    `;
    attachForm();
  }

  else if(page === "daftar"){
    content.innerHTML = `<div id="kulinerContainer" class="row"></div>`;
    loadKuliner();
  }

  else if(page === "dashboard"){
    content.innerHTML = `
      <div class="card p-4 shadow">
        <h3>📊 Dashboard Kuliner</h3>
        <canvas id="chart"></canvas>
      </div>
    `;
    loadChart();
  }

  // ================= ADMIN =================
  else if(page === "admin"){

    if(getRole() !== "admin"){
      alert("Akses ditolak!");
      showPage("home");
      return;
    }

    content.innerHTML = `
      <div class="card p-4">
        <h3>🛠 Panel Admin</h3>
        <p>Di sini nanti approve / reject data kuliner</p>
      </div>
    `;
  }
}

// ================= SIMULASI LOGIN =================
function login(){
  let email = document.getElementById("email").value;

  if(email === "admin@gmail.com"){
    setRole("admin");
    alert("Login sebagai Admin");
  } else {
    setRole("user");
    alert("Login sebagai User");
  }

  renderMenu();
  showPage("home");
}

// ================= LOAD =================
document.addEventListener("DOMContentLoaded", function(){
  renderMenu();
  showPage("home");
});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
