<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kuliner Lokal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold">🍜 Kuliner Lokal</a>

    <div class="ms-auto">
      <a href="javascript:void(0)" class="btn btn-light btn-sm me-2" onclick="showPage('home')">Beranda</a>
      <a href="javascript:void(0)" class="btn btn-light btn-sm me-2" onclick="showPage('daftar')">Kuliner</a>
      <a href="javascript:void(0)" class="btn btn-success btn-sm" onclick="showPage('tambah')">Tambah</a>
    </div>
  </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5" id="content"></div>

<script src="script.js"></script>

<script>
function showPage(page){

  let content = document.getElementById("content");

  // ================= HOME =================
  if(page === "home"){
    content.innerHTML = `
      <div class="p-5 text-center bg-white shadow rounded">
        <h1 class="fw-bold">🍔 Jelajah Kuliner Lokal</h1>
        <p>Temukan makanan enak di daerahmu 😋</p>
      </div>
    `;
  }

  // ================= TAMBAH =================
  else if(page === "tambah"){
    content.innerHTML = `
      <div class="card shadow p-4">
        <h3>Tambah Kuliner</h3>
        <form id="formKuliner">
          <input id="nama_makanan" class="form-control mb-2" placeholder="Nama Makanan" required>
          <input id="kategori" class="form-control mb-2" placeholder="Kategori">
          <input id="lokasi" class="form-control mb-2" placeholder="Lokasi">
          <input id="harga" type="number" class="form-control mb-2" placeholder="Harga">
          <textarea id="deskripsi" class="form-control mb-2"></textarea>
          <input id="rating" type="number" class="form-control mb-2" placeholder="Rating (1-5)">
          <button class="btn btn-success w-100">Simpan</button>
        </form>
      </div>
    `;

    if(typeof attachForm === "function"){
      attachForm();
    }
  }

  // ================= DAFTAR =================
  else if(page === "daftar"){
    content.innerHTML = `<div id="kulinerContainer" class="row"></div>`;

    if(typeof loadKuliner === "function"){
      loadKuliner();
    }
  }
}

// default load
document.addEventListener("DOMContentLoaded", function(){
  showPage("home");
});
</script>

</body>
</html>
