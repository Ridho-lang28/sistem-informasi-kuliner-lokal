<!DOCTYPE html>
<html lang="id">
<head>

<!-- ================= PENGATURAN DASAR HALAMAN ================= -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kuliner Lokal</title>

<!-- ================= LIBRARY BOOTSTRAP & CHART ================= -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ================= STYLE UTAMA WEBSITE ================= */

body{
background:#f5f6f8;
font-family:Arial,sans-serif;
}

/* Navbar */
.navbar{
background:linear-gradient(45deg,#ff7f50,#ff9966);
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.navbar-brand{
font-weight:bold;
font-size:22px;
}

/* Card umum */
.card{
border:none;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* Tombol */
.btn{
border-radius:12px;
transition:.3s;
}

.btn:hover{
transform:scale(1.03);
}

/* Input form */
.form-control{
border-radius:12px;
padding:12px;
}

/* Hero beranda */
.hero{
background:white;
padding:70px 30px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.hero h1{
font-size:48px;
font-weight:bold;
}

.hero p{
font-size:20px;
color:#666;
}

/* Kartu statistik dashboard */
.stats-card h2{
font-weight:bold;
}

/* Grafik */
canvas{
max-height:420px;
}
</style>

</head>
<body>


<!-- ================= NAVBAR MENU ================= -->
<nav class="navbar navbar-dark">
<div class="container d-flex justify-content-between">

<a class="navbar-brand">
🍜 Kuliner Lokal
</a>

<div class="dropdown">
<button
class="btn btn-dark border-0 fs-4"
data-bs-toggle="dropdown">
⋮
</button>

<ul
class="dropdown-menu dropdown-menu-end"
id="menuList">
</ul>

</div>
</div>
</nav>



<!-- ================= TEMPAT LOAD HALAMAN DINAMIS ================= -->
<div class="container mt-5" id="content"></div>



<script>

/* ================= FUNGSI NAVIGASI HALAMAN ================= */
/* Mengatur halaman mana yang tampil */
function showPage(page){

let content=
document.getElementById("content");



/* ================= HALAMAN HOME ================= */
if(page==="home"){

content.innerHTML=`

<div class="hero text-center">

<h1>
🍔 Jelajah Kuliner Lokal
</h1>

<p class="mt-3">
Temukan makanan enak di daerahmu 😋
</p>

<button
class="btn btn-warning btn-lg mt-4"
onclick="showPage('daftar')">

Lihat Kuliner

</button>

</div>

`;

}



/* ================= HALAMAN LOGIN ================= */
else if(page==="login"){

content.innerHTML=`

<div class="card p-4 col-md-5 mx-auto">

<h3 class="text-center mb-4">
🔐 Login
</h3>

<input
id="email"
class="form-control mb-3"
placeholder="Email">

<input
id="password"
type="password"
class="form-control mb-4"
placeholder="Password">

<button
class="btn btn-dark w-100"
onclick="login()">
Masuk
</button>

</div>

`;

}



/* ================= HALAMAN REGISTER ================= */
else if(page==="register"){

content.innerHTML=`

<div class="card p-4 col-md-5 mx-auto">

<h3 class="text-center mb-4">
📝 Register
</h3>

<input
id="email"
class="form-control mb-3"
placeholder="Email">

<input
id="password"
type="password"
class="form-control mb-4"
placeholder="Password">

<button
class="btn btn-success w-100"
onclick="register()">
Daftar
</button>

</div>

`;

}



/* ================= HALAMAN TAMBAH KULINER ================= */
else if(page==="tambah"){

content.innerHTML=`

<div class="card p-4">

<h3 class="mb-4">
➕ Tambah Kuliner
</h3>

<form id="formKuliner">

<input id="nama_makanan" class="form-control mb-3" placeholder="Nama makanan">
<input id="kategori" class="form-control mb-3" placeholder="Kategori">
<input id="lokasi" class="form-control mb-3" placeholder="Lokasi">
<input id="harga" class="form-control mb-3" placeholder="Harga">

<textarea
id="deskripsi"
class="form-control mb-3"
placeholder="Deskripsi">
</textarea>

<input id="rating" class="form-control mb-4" placeholder="Rating">

<button class="btn btn-success w-100">
Simpan
</button>

</form>

</div>

`;

attachForm();

}



/* ================= HALAMAN DAFTAR KULINER ================= */
else if(page==="daftar"){

content.innerHTML=`
<h3 class="mb-4">
🍽 Daftar Kuliner
</h3>

<div
id="kulinerContainer"
class="row">
</div>
`;

loadKuliner();

}



/* ================= HALAMAN DASHBOARD ================= */
else if(page==="dashboard"){

if(!isLogin()){
showPage("login");
return;
}

content.innerHTML=`

<div class="mt-4">

<h3 class="mb-1">
📊 Dashboard Statistik Kuliner
</h3>

<p class="text-muted mb-4">
Top 10 pengeluaran per kapita tertinggi
</p>

<div class="row mb-4">

<div class="col-md-4">
<div class="card stats-card text-center p-4">
<h5>Total Data</h5>
<h2 id="totalKuliner">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card stats-card text-center p-4">
<h5>Terendah</h5>
<h2 id="murah">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card stats-card text-center p-4">
<h5>Tertinggi</h5>
<h2 id="mahal">0</h2>
</div>
</div>

</div>

<div class="card p-4">

<div class="text-end mb-3">
<small class="text-muted">
Sumber:
BPS / API
</small>
</div>

<canvas id="chart"></canvas>

</div>

</div>

`;

loadChart();

}



/* ================= HALAMAN ADMIN ================= */
else if(page==="admin"){

if(getRole()!=="admin"){
showPage("home");
return;
}

content.innerHTML=`

<div class="card p-4">

<h3>
🛠 Panel Admin
</h3>

<p class="text-muted">
Approve / Reject usulan publik
</p>

<div id="adminList"></div>

</div>

`;

loadAdmin();

}

}
</script>



<!-- ================= FILE JAVASCRIPT UTAMA ================= -->
<script src="script.js"></script>

<!-- ================= BOOTSTRAP JAVASCRIPT ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
