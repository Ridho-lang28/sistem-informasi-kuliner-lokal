<script>
const content=()=>document.getElementById("content");

function cardForm(title,btnText,btnClass,action,fields){
return `
<div class="card p-4 col-md-5 mx-auto">
<h3 class="text-center mb-4">${title}</h3>

${fields}

<button
class="btn ${btnClass} w-100"
onclick="${action}()">
${btnText}
</button>

</div>
`;
}


function showPage(page){

let c=content();

switch(page){


// HOME
case "home":

c.innerHTML=`
<div class="hero text-center">
<h1>🍔 Jelajah Kuliner Lokal</h1>

<p class="mt-3">
Temukan makanan enak di daerahmu 😋
</p>

<button
class="btn btn-warning btn-lg mt-4"
onclick="showPage('daftar')">
Lihat Kuliner
</button>

</div>
`;
break;



// LOGIN
case "login":

c.innerHTML=
cardForm(
"🔐 Login",
"Masuk",
"btn-dark",
"login",

`
<input
id="email"
class="form-control mb-3"
placeholder="Email">

<input
id="password"
type="password"
class="form-control mb-4"
placeholder="Password">
`
);

break;



// REGISTER
case "register":

c.innerHTML=
cardForm(
"📝 Register",
"Daftar",
"btn-success",
"register",

`
<input
id="email"
class="form-control mb-3"
placeholder="Email">

<input
id="password"
type="password"
class="form-control mb-4"
placeholder="Password">
`
);

break;



// TAMBAH
case "tambah":

c.innerHTML=`
<div class="card p-4">

<h3 class="mb-4">
➕ Tambah Kuliner
</h3>

<form id="formKuliner">

<input id="nama_makanan"
class="form-control mb-3"
placeholder="Nama makanan">

<input id="kategori"
class="form-control mb-3"
placeholder="Kategori">

<input id="lokasi"
class="form-control mb-3"
placeholder="Lokasi">

<input id="harga"
class="form-control mb-3"
placeholder="Harga">

<textarea
id="deskripsi"
class="form-control mb-3"
placeholder="Deskripsi">
</textarea>

<input
id="rating"
class="form-control mb-4"
placeholder="Rating">

<button
class="btn btn-success w-100">
Simpan
</button>

</form>

</div>
`;

attachForm();
break;



// DAFTAR
case "daftar":

c.innerHTML=`
<h3 class="mb-4">
🍽 Daftar Kuliner
</h3>

<div
id="kulinerContainer"
class="row">
</div>
`;

loadKuliner();

break;



// DASHBOARD
case "dashboard":

if(!isLogin()){
showPage("login");
return;
}

c.innerHTML=`

<div class="mt-4">

<h3 class="mb-1">
📊 Dashboard Statistik Kuliner
</h3>

<p class="text-muted mb-4">
Top 10 pengeluaran per kapita tertinggi
</p>

<div class="row mb-4">

${["Total Data","Terendah","Tertinggi"]
.map((t,i)=>`
<div class="col-md-4">
<div class="card stats-card text-center p-4">
<h5>${t}</h5>

<h2 id="${
["totalKuliner","murah","mahal"][i]
}">
0
</h2>

</div>
</div>
`).join("")}

</div>


<div class="card p-4">

<div class="text-end mb-3">
<small class="text-muted">
Sumber: BPS / API
</small>
</div>

<canvas id="chart"></canvas>

</div>

</div>
`;

loadChart();

break;



// ADMIN
case "admin":

if(getRole()!=="admin"){
showPage("home");
return;
}

c.innerHTML=`
<div class="card p-4">

<h3>
🛠 Panel Admin
</h3>

<p class="text-muted">
Approve / Reject usulan publik
</p>

<div id="adminList"></div>

</div>
`;

loadAdmin();

break;

}

}
</script>
