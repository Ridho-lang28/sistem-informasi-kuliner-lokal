<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kuliner Lokal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold">🍜 Kuliner Lokal</a>

    <div class="ms-auto">
      <a href="#" class="btn btn-light btn-sm me-2" onclick="showPage('home')">Beranda</a>
      <a href="#" class="btn btn-light btn-sm me-2" onclick="showPage('daftar')">Kuliner</a>
      <a href="#" class="btn btn-success btn-sm me-2" onclick="showPage('tambah')">Tambah</a>
      <a href="#" class="btn btn-warning btn-sm me-2" onclick="showPage('dashboard')">Dashboard</a>
      <a href="#" class="btn btn-dark btn-sm me-2" onclick="showPage('login')">Login</a>
      <a href="#" class="btn btn-secondary btn-sm me-2" onclick="showPage('register')">Daftar</a>
      <a href="#" class="btn btn-danger btn-sm" onclick="logout()">Logout</a>
    </div>
  </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5" id="content"></div>

<script src="script.js"></script>

<script>
function showPage(page){
  let content = document.getElementById("content");

  // ================= HOME =================
  if(page === "home"){
    content.innerHTML = `
      <div class="p-5 text-center bg-white shadow rounded">
        <h1 class="fw-bold">🍔 Jelajah Kuliner Lokal</h1>
        <p>Temukan makanan enak di daerahmu 😋</p>
      </div>
    `;
  }

  // ================= LOGIN =================
  else if(page === "login"){
    content.innerHTML = `
      <div class="card p-4 col-md-4 mx-auto">
        <h3>Login</h3>
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-dark w-100" onclick="login()">Login</button>
      </div>
    `;
  }

  // ================= REGISTER =================
  else if(page === "register"){
    content.innerHTML = `
      <div class="card p-4 col-md-4 mx-auto">
        <h3>Register</h3>
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-success w-100" onclick="register()">Daftar</button>
      </div>
    `;
  }

  // ================= TAMBAH =================
  else if(page === "tambah"){
    content.innerHTML = `
      <div class="card shadow p-4">
        <h3>Tambah Kuliner</h3>
        <form id="formKuliner">
          <input id="nama_makanan" class="form-control mb-2" placeholder="Nama Makanan" required>
          <input id="kategori" class="form-control mb-2" placeholder="Kategori">
          <input id="lokasi" class="form-control mb-2" placeholder="Lokasi">
          <input id="harga" type="number" class="form-control mb-2" placeholder="Harga">
          <textarea id="deskripsi" class="form-control mb-2"></textarea>
          <input id="rating" type="number" class="form-control mb-2" placeholder="Rating (1-5)">
          <button class="btn btn-success w-100">Simpan</button>
        </form>
      </div>
    `;
    attachForm();
  }

  // ================= DAFTAR =================
  else if(page === "daftar"){
    content.innerHTML = `<div id="kulinerContainer" class="row"></div>`;
    loadKuliner();
  }

  // ================= DASHBOARD =================
  else if(page === "dashboard"){
    content.innerHTML = `
      <div class="card p-4 shadow">
        <h3>📊 Dashboard Kuliner</h3>
        <canvas id="chart"></canvas>
      </div>
    `;
    loadChart();
  }
}

// default
document.addEventListener("DOMContentLoaded", function(){
  showPage("home");
});
</script>

</body>
</html>
