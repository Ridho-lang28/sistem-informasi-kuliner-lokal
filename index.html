<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kuliner Lokal</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#f5f6f8;
font-family:Arial;
}

.navbar{
background:#ff7f50;
}

.navbar-brand{
font-weight:bold;
}

.card{
border:none;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}
</style>

</head>
<body>


<!-- NAVBAR -->
<nav class="navbar navbar-dark">
<div class="container d-flex justify-content-between">

<a class="navbar-brand">
🍜 Kuliner Lokal
</a>

<div class="dropdown">

<button
class="btn btn-dark border-0 fs-4"
data-bs-toggle="dropdown">
⋮
</button>

<ul
class="dropdown-menu dropdown-menu-end"
id="menuList">
</ul>

</div>

</div>
</nav>



<!-- CONTENT -->
<div class="container mt-5" id="content"></div>



<script>
function showPage(page){

let content=document.getElementById("content");


// HOME
if(page==="home"){

content.innerHTML=`
<div class="p-5 text-center bg-white rounded shadow">

<h1 class="fw-bold">
🍔 Jelajah Kuliner Lokal
</h1>

<p>
Temukan makanan enak di daerahmu 😋
</p>

</div>
`;

}



// LOGIN
else if(page==="login"){

content.innerHTML=`
<div class="card p-4 col-md-4 mx-auto">

<h3 class="text-center mb-3">
Login
</h3>

<input
id="email"
class="form-control mb-2"
placeholder="Email">

<input
id="password"
type="password"
class="form-control mb-3"
placeholder="Password">

<button
class="btn btn-dark w-100"
onclick="login()">
Login
</button>

</div>
`;

}



// REGISTER
else if(page==="register"){

content.innerHTML=`
<div class="card p-4 col-md-4 mx-auto">

<h3 class="text-center mb-3">
Register
</h3>

<input
id="email"
class="form-control mb-2"
placeholder="Email">

<input
id="password"
type="password"
class="form-control mb-3"
placeholder="Password">

<button
class="btn btn-success w-100"
onclick="register()">
Daftar
</button>

</div>
`;

}



// TAMBAH
else if(page==="tambah"){

content.innerHTML=`
<div class="card p-4">

<h3>Tambah Kuliner</h3>

<form id="formKuliner">

<input
id="nama_makanan"
class="form-control mb-2"
placeholder="Nama makanan">

<input
id="kategori"
class="form-control mb-2"
placeholder="Kategori">

<input
id="lokasi"
class="form-control mb-2"
placeholder="Lokasi">

<input
id="harga"
class="form-control mb-2"
placeholder="Harga">

<textarea
id="deskripsi"
class="form-control mb-2"
placeholder="Deskripsi"></textarea>

<input
id="rating"
class="form-control mb-3"
placeholder="Rating">

<button class="btn btn-success w-100">
Simpan
</button>

</form>

</div>
`;

attachForm();

}



// DAFTAR
else if(page==="daftar"){

content.innerHTML=`
<div
id="kulinerContainer"
class="row">
</div>
`;

loadKuliner();

}



// DASHBOARD
else if(page==="dashboard"){

if(!isLogin()){
alert("Login dulu");
showPage("login");
return;
}

content.innerHTML=`

<div class="container mt-4">

<h3 class="mb-1">
📊 Dashboard Statistik Kuliner (Data BPS)
</h3>

<p class="text-muted mb-4">
Grafik ini menampilkan
<b>Top 10 daerah dengan pengeluaran per kapita tertinggi</b>
di Indonesia.
</p>


<div class="row mb-4">

<div class="col-md-4">
<div class="card shadow text-center p-4">
<h5>Total Data</h5>
<h2 id="totalKuliner">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card shadow text-center p-4">
<h5>Terendah</h5>
<h2 id="murah">0</h2>
</div>
</div>

<div class="col-md-4">
<div class="card shadow text-center p-4">
<h5>Tertinggi</h5>
<h2 id="mahal">0</h2>
</div>
</div>

</div>


<div class="card shadow p-4" style="height:500px;">

<div class="mb-3 text-end">
<small class="text-muted">
Sumber: BPS | Update otomatis dari API
</small>
</div>

<canvas id="chart"></canvas>

</div>

</div>

`;

loadChart();

}

// ADMIN
else if(page==="admin"){

if(getRole()!=="admin"){
alert("Akses ditolak");
showPage("home");
return;
}

content.innerHTML=`

<div class="card p-4">

<h3>
🛠 Panel Admin
</h3>

<p class="text-muted">
Approve / Reject usulan publik
</p>

<div id="adminList"></div>

</div>

`;

loadAdmin();

}

}
</script>


<!-- PENTING -->
<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
